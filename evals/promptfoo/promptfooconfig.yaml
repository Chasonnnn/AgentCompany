# Paperclip Agent Evals
#
# Tests narrow heartbeat behaviors through the local Paperclip component-eval
# endpoint. Promptfoo remains the case/assertion harness; Paperclip executes the
# real local adapters.
#
# Usage:
#   cd evals/promptfoo && PAPERCLIP_COMPONENT_EVAL_BASE_URL=http://127.0.0.1:3100 promptfoo eval
#   promptfoo view  # open results in browser
#
# Validate config before committing:
#   promptfoo validate
#
# Requires a reachable local Paperclip server with /api/instance/evals/component-run.

description: "Paperclip local component evals"

prompts:
  - file://prompts/heartbeat-system.txt

providers:
  - id: file://providers/paperclip-local-provider.mjs
    label: codex_local
    config:
      adapterType: codex_local
      timeoutMs: 180000
  - id: file://providers/paperclip-local-provider.mjs
    label: claude_local
    config:
      adapterType: claude_local
      timeoutMs: 180000

defaultTest:
  options:
    transformVars: "{ ...vars, apiUrl: process.env.PAPERCLIP_COMPONENT_EVAL_BASE_URL || 'http://127.0.0.1:3100', runId: vars.runId || 'component-eval-001' }"

tests:
  - file://tests/*.yaml
